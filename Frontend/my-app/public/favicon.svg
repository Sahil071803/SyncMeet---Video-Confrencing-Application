<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- S squircle background -->
  <rect x="40" y="40" width="432" height="432" rx="96" fill="url(#g1)"/>

  <!-- Inner glass layer -->
  <rect x="64" y="64" width="384" height="384" rx="76" fill="rgba(255,255,255,0.06)"/>

  <!-- Camera body outline -->
  <rect x="100" y="170" width="260" height="170" rx="32" fill="none" stroke="#fff" stroke-width="16" opacity="0.5"/>
  <rect x="116" y="186" width="228" height="138" rx="20" fill="#0F172A"/>

  <!-- Camera lens ring -->
  <circle cx="230" cy="255" r="48" fill="none" stroke="url(#g2)" stroke-width="10"/>
  <!-- Camera lens -->
  <circle cx="230" cy="255" r="30" fill="url(#g2)"/>
  <!-- Inner dot -->
  <circle cx="230" cy="255" r="10" fill="#fff"/>

  <!-- Sync indicator (right side) -->
  <path d="M348 200l-24 18 24 18" fill="none" stroke="url(#g2)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M348 310l-24-18 24-18" fill="none" stroke="url(#g2)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Recording dot -->
  <circle cx="330" cy="200" r="8" fill="#22C55E"/>

  <!-- S letter beautifully integrated -->
  <text x="316" y="308" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="60" font-weight="700" fill="#fff" opacity="0.3">S</text>
</svg>
