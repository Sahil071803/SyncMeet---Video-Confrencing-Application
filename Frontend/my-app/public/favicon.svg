<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="256" r="220" fill="url(#bg)" opacity="0.12"/>

  <!-- Hexagonal badge -->
  <polygon points="256,68 406,148 406,364 256,444 106,364 106,148" fill="url(#bg)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Inner glass panel -->
  <polygon points="256,96 380,164 380,348 256,416 132,348 132,164" fill="rgba(15,23,42,0.6)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Camera body -->
  <rect x="140" y="200" width="180" height="120" rx="20" fill="url(#accent)" opacity="0.25"/>
  <rect x="148" y="208" width="164" height="104" rx="14" fill="#0F172A"/>

  <!-- Camera lens outer -->
  <circle cx="230" cy="260" r="34" fill="url(#accent)" opacity="0.3"/>
  <!-- Camera lens inner -->
  <circle cx="230" cy="260" r="22" fill="url(#accent)"/>

  <!-- Play button triangle inside lens -->
  <polygon points="222,248 222,272 242,260" fill="#fff"/>

  <!-- Sync arrow top -->
  <path d="M328 218l24-18-24-18" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M328 254l24-18-24-18" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,36)"/>

  <!-- S monogram -->
  <text x="256" y="448" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="48" font-weight="700" fill="url(#ring)" text-anchor="middle">SYNC</text>
</svg>
