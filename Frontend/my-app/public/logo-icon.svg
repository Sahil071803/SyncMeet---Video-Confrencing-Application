<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="sm-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Camera body -->
  <rect x="80" y="160" width="280" height="192" rx="32" fill="url(#sm-grad)"/>
  <rect x="96" y="176" width="248" height="160" rx="20" fill="#0F172A"/>
  <!-- Camera lens -->
  <circle cx="220" cy="256" r="52" fill="url(#sm-accent)" opacity="0.3"/>
  <circle cx="220" cy="256" r="36" fill="url(#sm-accent)"/>
  <circle cx="220" cy="256" r="16" fill="#fff"/>
  <!-- Sync arrows -->
  <path d="M360 180l40 36-40 36" fill="none" stroke="url(#sm-grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M400 320l-40-36 40-36" fill="none" stroke="url(#sm-accent)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- S letter -->
  <text x="220" y="278" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="80" font-weight="800" fill="#fff" text-anchor="middle" dominant-baseline="central">S</text>
</svg>
